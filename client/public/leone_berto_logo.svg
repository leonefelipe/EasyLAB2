<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 90" width="520" height="90" role="img" aria-label="Leone Berto Consultoria">
  <defs>
    <style>
      .lb-navy  { fill: #1B2F4A; }
      .lb-gold  { fill: #C8A15E; }
    </style>
  </defs>

  <!-- Monograma LB -->
  <text x="8" y="62"
    font-family="'Cinzel', 'Cormorant Garamond', Georgia, serif"
    font-size="58" font-weight="700"
    class="lb-navy">L</text>

  <text x="40" y="62"
    font-family="'Cinzel', 'Cormorant Garamond', Georgia, serif"
    font-size="50" font-weight="700"
    class="lb-gold">B</text>

  <!-- Seta ascendente (simbolo de crescimento conforme brand book) -->
  <line x1="46" y1="58" x2="60" y2="44" stroke="#C8A15E" stroke-width="2.2" stroke-linecap="round"/>
  <polygon points="60,44 54,47 57,53" fill="#C8A15E"/>

  <!-- Separador vertical -->
  <line x1="88" y1="10" x2="88" y2="80" stroke="#1B2F4A" stroke-width="1.2" opacity="0.6"/>

  <!-- LEONE BERTO (serif, navy) -->
  <text x="100" y="44"
    font-family="'Cinzel', 'Cormorant Garamond', Georgia, serif"
    font-size="30" font-weight="600"
    letter-spacing="2"
    class="lb-navy">LEONE BERTO</text>

  <!-- Linha + CONSULTORIA + Linha -->
  <line x1="100" y1="52" x2="155" y2="52" stroke="#C8A15E" stroke-width="0.9" opacity="0.85"/>

  <text x="158" y="57"
    font-family="'Open Sans', 'Lato', Arial, sans-serif"
    font-size="9.5" font-weight="500"
    letter-spacing="4"
    class="lb-gold">CONSULTORIA</text>

  <line x1="332" y1="52" x2="516" y2="52" stroke="#C8A15E" stroke-width="0.9" opacity="0.85"/>

  <!-- Tagline -->
  <text x="100" y="75"
    font-family="'Open Sans', 'Lato', Arial, sans-serif"
    font-size="7.5" font-weight="400"
    letter-spacing="2.2"
    fill="#1B2F4A" opacity="0.7">ESTRATÉGIA DE CARREIRA E POSICIONAMENTO PROFISSIONAL</text>
</svg>
